<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Gerador de Testes IoT{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 20px;
        }
        h1, h2 {
            color: #2f3640;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        a {
            color: #0097e6;
            text-decoration: none;
        }
        button {
            padding: 8px 16px;
            background: #0097e6;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #40739e;
        }
        input, select {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
        }
        .field {
            margin-bottom: 12px;
        }
        pre {
            background: #2f3640;
            color: #f5f6fa;
            padding: 15px;
            overflow-x: auto;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
