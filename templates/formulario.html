{% extends "base.html" %}
{% block title %}{{ ontologia }}{% endblock %}

{% block content %}
<h1>Configuração do sensor {{ ontologia }}</h1>

<form method="post">
    {% for campo in campos %}
        <div class="field">
            <label><strong>{{ campo.Campo }}</strong></label>
            <small>{{ campo.Descrição }}</small>

            {% if campo.Opções %}
                <select name="{{ campo.Campo }}">
                    {% for opt in campo.Opções.split(',') %}
                        <option value="{{ opt }}"
                            {% if valores_default[campo.Campo] == opt %}selected{% endif %}
                        >{{ opt }}</option>
                    {% endfor %}
                </select>
            {% else %}
                <input type="text"
                       name="{{ campo.Campo }}"
                       value="{{ valores_default[campo.Campo] }}">
            {% endif %}
        </div>
    {% endfor %}

    <button type="submit">Gerar testes</button>
</form>

<br>
<a href="{{ url_for('home') }}">⬅ Voltar</a>
{% endblock %}
